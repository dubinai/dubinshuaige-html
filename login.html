<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 | 杜斌个人主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#050816;color:#fff;}
        /* 替换稳定无报错背景图 */
        .bg{position:fixed;top:0;left:0;width:100%;height:100%;background:#050816;z-index:-1;}
        nav{width:100%;padding:20px 5%;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:99;}
        .nav-box{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
        .logo{font-size:22px;font-weight:bold;color:#409eff;}
        .nav-a a{color:#ccc;text-decoration:none;margin:0 8px;transition:0.3s;padding:6px 10px;border-radius:6px;}
        .nav-a a:hover{color:#409eff;background:rgba(64,158,255,0.1);}
        .container{max-width:450px;margin:80px auto;padding:0 20px;}
        .login-box{background:rgba(255,255,255,0.05);border:1px solid rgba(64,158,255,0.2);border-radius:16px;padding:40px;backdrop-filter:blur(10px);box-shadow:0 10px 40px rgba(0,0,0,0.3);}
        h2{text-align:center;color:#409eff;margin-bottom:30px;font-size:28px;}
        .avatar{width:120px;height:120px;border-radius:50%;margin:0 auto 20px;display:block;background:#409eff;border:3px solid #409eff;box-shadow:0 0 20px rgba(64,158,255,0.3);text-align:center;line-height:120px;font-size:40px;color:#fff;}
        input{width:100%;padding:15px;margin:10px 0;background:rgba(255,255,255,0.1);border:1px solid rgba(64,158,255,0.3);border-radius:8px;color:#fff;font-size:16px;outline:none;transition:0.3s;}
        input:focus{border-color:#409eff;box-shadow:0 0 12px rgba(64,158,255,0.25);}
        input::placeholder{color:#999;}
        /* 修复按钮点击失效，开启最高点击层级 */
        .login-btn{width:100%;padding:15px;background:#409eff;border:none;border-radius:8px;color:#fff;font-size:17px;cursor:pointer;margin-top:15px;transition:0.3s;pointer-events:auto;position:relative;z-index:10;user-select:none;}
        .login-btn:hover{background:#2986e8;transform:translateY(-3px);box-shadow:0 8px 25px rgba(64,158,255,0.4);}
        .login-btn:active{transform:translateY(0px);}
        .tips{text-align:center;margin-top:20px;color:#999;font-size:14px;}
        .tips a{color:#409eff;text-decoration:none;}
        footer{margin-top:80px;padding:30px 0;text-align:center;color:#888;border-top:1px solid rgba(255,255,255,0.1);}
    </style>
</head>
<body>
    <div class="bg"></div>
    <nav>
        <div class="nav-box">
            <div class="logo">杜斌个人主页</div>
            <div class="nav-a">
                <a href="index.html">首页</a>
                <a href="about.html">个人简介</a>
                <a href="study.html">学习经历</a>
                <a href="skill.html">专业技能</a>
                <a href="project.html">项目作品</a>
                <a href="honor.html">荣誉奖项</a>
                <a href="certificate.html">技能证书</a&gt>
                <a href="life.html">生活日常</a&gt>
                <a href="blog.html">博客日志</a&gt>
                <a href="message.html">留言板块</a&gt>
                <a href="contact.html">联系方式</a>
                <a href="login.html">个人中心</a>
            </div>
        </div>
    </nav&gt>
    <div class="container">
        <div class="login-box">
            <div class="avatar">杜斌</div>
            <h2>个人中心登录</h2>
            <input type="text" placeholder="请输入用户名" value="杜斌" id="username">
            <input type="password" placeholder="请输入密码" value="123456" id="pwd">
            <button class="login-btn" onclick="loginFun()">立即登录</button>
            <div class="tips">默认账号密码：杜斌 / 123456 <a href="index.html">返回首页</a></div>
        </div>
    </div>
    <footer>© 2026 杜斌 个人主页 版权所有｜移动应用开发课程作业</footer>

    <script>
        // 新增完整登录点击交互逻辑，彻底解决按钮点不了问题
        function loginFun(){
            let user = document.getElementById("username").value;
            let pwd = document.getElementById("pwd").value;
            if(user === "杜斌" && pwd === "123456"){
                alert("登录成功！欢迎进入个人中心");
                window.location.href = "index.html";
            }else{
                alert("账号或密码错误，请重新输入！");
            }
        }
    </script>
</body>
</html>
